name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  steply-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Java (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          
      - name: Install Steply
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/QABEES/steply/main/scripts/install.sh | bash

          # If the installer places the binary in ~/.local/bin, make sure it's on PATH
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          # Optional sanity check
          command -v steply
          steply --version || true

      - name: Patch Steply to use system Java
        shell: bash
        run: |
          set -euo pipefail

          # Find the installed distribution (matches your log path)
          STEPly_HOME="$HOME/.local/share/steply"
          DIST_DIR="$(find "$STEPly_HOME" -maxdepth 2 -type d -name 'steply-dist' | head -n 1)"
          echo "DIST_DIR=$DIST_DIR"

          # Replace bundled-java invocation with `java`
          # (This assumes line 6 is the bundled java call as in your error)
          sed -i 's|.*/jre/bin/java|java|g' "$DIST_DIR/bin/steply.sh"

          # show first lines for debugging
          head -n 20 "$DIST_DIR/bin/steply.sh"
          
      - name: Run Steply scenario
        shell: bash
        run: |
          set -euo pipefail
          java -version
          steply --scenario tests/get_user_api.json --target-env env/sit1.properties
          
      # - name: Run Steply scenario
      #   shell: bash
      #   run: |
      #     set -euo pipefail
      #     steply --scenario tests/get_user_api.json --target-env env/sit1.properties
