name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  steply-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Steply
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/QABEES/steply/main/scripts/install.sh | bash

          # If the installer places the binary in ~/.local/bin, make sure it's on PATH
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          # Optional sanity check
          command -v steply
          steply --version || true

      - name: Run Steply scenario
        shell: bash
        run: |
          set -euo pipefail
          steply --scenario tests/get_user_api.json --target-env env/sit1.properties
