name: CI                                                                                                                                                                                                 
                                                                                                                                                                                                         
on:                                                                                                                                                                                                      
  push:                                                                                                                                                                                                  
    branches: [ main ]
  pull_request:                                                                                                                                                                                          
    branches: [ main ]                                                                                                                                                                                   
  workflow_dispatch:                                                                                                                                                                                     

jobs:
  steply-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Steply
        run: |
          curl -fsSL https://raw.githubusercontent.com/QABEES/steply/main/scripts/install_no_jre.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run tests
        run: steply --scenario tests/get_user_api.json --target-env env/sit1.properties
