name: CI                                                                                                                                                                                                 
                                                                                                                                                                                                         
on:                                                                                                                                                                                                      
  push:                                                                                                                                                                                                  
    branches: [ main ]
  pull_request:                                                                                                                                                                                          
    branches: [ main ]                                                                                                                                                                                   
  workflow_dispatch:                                                                                                                                                                                     

jobs:
  steply-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Installs Steply CLI (no-JRE variant) and adds it to PATH
      - name: Install Steply
        run: |
          curl -fsSL https://raw.githubusercontent.com/QABEES/steply/main/scripts/install_no_jre.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Steply version
        run: steply --version

      - name: Run tests
        run: steply --scenario tests/get_user_api.json --target-env env/sit1.properties

      # TEST REPORTS & LOGS:
      # --------------------
      # if: always() - Upload reports regardless of test pass/fail so failures can be diagnosed
      # retention-days: 7 - Reports are retained for 7 days and downloadable from the Actions run summary
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: steply-test-reports
          path: |
            target/zerocode-junit-granular-report.csv
            target/zerocode-junit-interactive-fuzzy-search.html
            target/logs/
          retention-days: 7
